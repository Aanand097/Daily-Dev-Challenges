<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener Logic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <h1>URL Shortener</h1>
    <p>Enter a long URL and get a shortened version instantly.</p>
    <form id="shortener-form">
      <input id="url-input" type="url" placeholder="https://example.com" required>
      <button type="submit">Shorten URL</button>
    </form>
    <div id="result" class="result hidden">
      <span>Short link:</span>
      <a id="short-link" href="#" target="_blank"></a>
    </div>
    <p id="error" class="error"></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
