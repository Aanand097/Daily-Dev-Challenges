<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debounce Function</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Debounce Demo</h1>
    <p>Type in the input field. The result updates only after you stop typing for 600ms.</p>
    <label for="search-input">Search query</label>
    <input id="search-input" type="text" placeholder="Start typing...">
    <div class="status">
      <span>Debounced value:</span>
      <strong id="output">Waiting for input...</strong>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
