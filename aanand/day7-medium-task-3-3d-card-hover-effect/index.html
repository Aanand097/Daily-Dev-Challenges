<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Card Hover Effect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="scene">
    <div class="card">
      <div class="card__layer card__layer--front">
        <h1>3D Hover Card</h1>
        <p>Move your mouse over the card to see the layered 3D transform effect.</p>
      </div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--glow"></div>
    </div>
  </section>
</body>
</html>
