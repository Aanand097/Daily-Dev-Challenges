<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Previewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <h1>Markdown Previewer</h1>
      <p>Write markdown on the left and preview HTML on the right in real time.</p>
    </header>
    <div class="grid">
      <section class="panel">
        <h2>Editor</h2>
        <textarea id="editor"># Hello world\n\nType **Markdown** and see the preview update!</textarea>
      </section>
      <section class="panel preview">
        <h2>Preview</h2>
        <div id="preview"></div>
      </section>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
