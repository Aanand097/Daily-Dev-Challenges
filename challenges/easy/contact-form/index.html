<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="form-card">
      <div class="form-header">
        <h1>Contact Us</h1>
        <p>Send a message and we'll get back to you soon.</p>
      </div>

      <form id="contactForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" />
          <p class="feedback" id="nameFeedback"></p>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" />
          <p class="feedback" id="emailFeedback"></p>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone" />
          <p class="feedback" id="phoneFeedback"></p>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Type your message"></textarea>
          <p class="feedback" id="messageFeedback"></p>
        </div>

        <button type="submit" class="submit-button">Submit</button>
        <p class="form-success" id="formSuccess"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
